<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <title>Vue CDN Composition API 示例</title>
  </head>
  <body>
    <div id="app">
      <h1>{{ title }}</h1>
      <button @click="increment">点击次数：{{ count }}</button>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
      const { createApp, ref } = Vue

      createApp({
        setup() {
          const title = ref('Composition API 入门')
          const count = ref(0)

          function increment() {
            count.value++
          }

          return {
            title,
            count,
            increment
          }
        }
      }).mount('#app')
    </script>
  </body>
</html>
